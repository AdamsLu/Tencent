[reward.global]
# Shared thresholds/constants for reward shaping.
birth_protection_steps = 10
trajectory_window = 20
safe_treasure_monster_dist = 0.2
danger_threshold = 0.15
late_danger_threshold = 0.25
wall_displacement_threshold = 0.5
normal_move_step = 1
buff_move_step = 2
idle_displacement_threshold = 0.25
wander_radius_threshold = 2.5
wander_min_points = 8
idle_wander_reset_distance = 6.0
dead_end_check_radius = 8
dead_end_boundary_trace_steps = 6
dead_end_opening_clusters_threshold = 1
dead_end_max_reachable_cells = 90
dead_end_max_reachable_ratio = 0.45
dead_end_reset_distance = 8.0
flash_fail_ratio = 0.3
flash_expected_dist_orthogonal = 10.0
flash_expected_dist_diagonal = 8.0
centroid_norm_max = 64.0

[reward.training]
use_curriculum = true

[reward.survive_reward]
enable = true
coef = 1

[reward.treasure_reward]
enable = true
coef = 1

[reward.speed_buff_reward]
enable = true
coef = 1

[reward.speed_buff_approach_reward]
enable = true
coef = 1

[reward.treasure_approach_reward]
enable = true
gravity_coef = 0.00005
min_reward = 0.0001
max_reward = 0.05
min_dist_norm = 0.005

[reward.monster_dist_shaping]
enable = true
coef = 1

[reward.late_survive_reward]
enable = false
base = 0.02
shaping_coef = 0.1

[reward.danger_penalty]
enable = false
coef = -0.1
power = 2.0

[reward.wall_collision_penalty]
enable = false
coef = -0.1

[reward.flash_fail_penalty]
enable = false
coef = -0.15

[reward.flash_escape_reward]
enable = false
base = 1.0
dist_gain_coef = 1.0

[reward.flash_survival_reward]
enable = false
init = 0.5
decay = 0.90

[reward.flash_abuse_penalty]
enable = false
caught_within_steps = 15
caught_coef = -1.0
safe_zone_no_treasure_coef = -1.0
caught_decay_enable = true
caught_decay_min_step = 1
caught_decay_max_step = 15
caught_coef_start = -10.0
caught_coef_end = -1.0

[reward.speed_buff_escape_reward]
enable = false
init = 0.05
decay = 0.97
base = 1.0
dist_delta_coef = 0.1

[reward.safe_zone_reward]
enable = false
coef = 0.01

[reward.exploration_reward]
enable = false
coef_per_cell = 0.0002

[reward.centroid_away_reward]
enable = false
coef = 0.05

[reward.idle_wander_penalty]
enable = false
idle_coef = -0.03
wander_coef = -0.05
idle_growth = 0.02
wander_growth = 0.02

[reward.dead_end_penalty]
enable = false
coef = -0.1

# =========================
# Stage-specific reward overrides
# 说明：
# 1. 这里写的是“按阶段覆盖”的参数，优先级高于上面的全局基础值
# 2. 只覆盖你想改的项；未写出的参数仍沿用全局基础值
# =========================

# -------------------------
# Stage 1: survival_base
# -------------------------
[reward.stage_overrides.stage1.survive_reward]
coef = 0.50

[reward.stage_overrides.stage1.monster_dist_shaping]
coef = 20.0

[reward.stage_overrides.stage1.danger_penalty]
coef = -0.10
power = 2.0

[reward.stage_overrides.stage1.wall_collision_penalty]
coef = -0.10

# -------------------------
# Stage 2: explore_and_stabilize
# -------------------------
[reward.stage_overrides.stage2.survive_reward]
coef = 0.50

[reward.stage_overrides.stage2.monster_dist_shaping]
coef = 18.0

[reward.stage_overrides.stage2.danger_penalty]
coef = -0.10
power = 2.0

[reward.stage_overrides.stage2.wall_collision_penalty]
coef = -0.10

[reward.stage_overrides.stage2.exploration_reward]
coef_per_cell = 0.00025

[reward.stage_overrides.stage2.centroid_away_reward]
coef = 0.06

[reward.stage_overrides.stage2.idle_wander_penalty]
idle_coef = -0.035
wander_coef = -0.055
idle_growth = 0.022
wander_growth = 0.022

[reward.stage_overrides.stage2.safe_zone_reward]
coef = 0.008

# -------------------------
# Stage 3: safe_resource_acquisition
# 核心思路：降低“纯保守/纯探索”比重，抬高资源导向
# -------------------------
[reward.stage_overrides.stage3.survive_reward]
coef = 0.40

[reward.stage_overrides.stage3.monster_dist_shaping]
coef = 12.0

[reward.stage_overrides.stage3.danger_penalty]
coef = -0.12
power = 2.0

[reward.stage_overrides.stage3.wall_collision_penalty]
coef = -0.10

[reward.stage_overrides.stage3.exploration_reward]
coef_per_cell = 0.00012

[reward.stage_overrides.stage3.centroid_away_reward]
coef = 0.03

[reward.stage_overrides.stage3.idle_wander_penalty]
idle_coef = -0.035
wander_coef = -0.060
idle_growth = 0.020
wander_growth = 0.025

[reward.stage_overrides.stage3.safe_zone_reward]
coef = 0.004

[reward.stage_overrides.stage3.treasure_reward]
coef = 3.0

[reward.stage_overrides.stage3.treasure_approach_reward]
gravity_coef = 0.00008
min_reward = 0.0002
max_reward = 0.08
min_dist_norm = 0.005

[reward.stage_overrides.stage3.speed_buff_reward]
coef = 1.5

[reward.stage_overrides.stage3.speed_buff_approach_reward]
coef = 0.12

[reward.stage_overrides.stage3.speed_buff_escape_reward]
init = 0.05
decay = 0.97
base = 1.2
dist_delta_coef = 0.12

# -------------------------
# Stage 4: full_game_and_skill_refine
# 核心思路：继续资源导向，同时放开技能学习
# -------------------------
[reward.stage_overrides.stage4.survive_reward]
coef = 0.35

[reward.stage_overrides.stage4.monster_dist_shaping]
coef = 10.0

[reward.stage_overrides.stage4.danger_penalty]
coef = -0.12
power = 2.0

[reward.stage_overrides.stage4.wall_collision_penalty]
coef = -0.10

[reward.stage_overrides.stage4.exploration_reward]
coef_per_cell = 0.00008

[reward.stage_overrides.stage4.centroid_away_reward]
coef = 0.02

[reward.stage_overrides.stage4.idle_wander_penalty]
idle_coef = -0.030
wander_coef = -0.050
idle_growth = 0.018
wander_growth = 0.020

[reward.stage_overrides.stage4.safe_zone_reward]
coef = 0.002

[reward.stage_overrides.stage4.treasure_reward]
coef = 3.5

[reward.stage_overrides.stage4.treasure_approach_reward]
gravity_coef = 0.00010
min_reward = 0.0002
max_reward = 0.10
min_dist_norm = 0.005

[reward.stage_overrides.stage4.speed_buff_reward]
coef = 1.2

[reward.stage_overrides.stage4.speed_buff_approach_reward]
coef = 0.08

[reward.stage_overrides.stage4.speed_buff_escape_reward]
init = 0.04
decay = 0.97
base = 1.2
dist_delta_coef = 0.12

[reward.stage_overrides.stage4.late_survive_reward]
base = 0.03
shaping_coef = 0.12

[reward.stage_overrides.stage4.flash_fail_penalty]
coef = -0.15

[reward.stage_overrides.stage4.flash_escape_reward]
base = 1.5
dist_gain_coef = 1.2

[reward.stage_overrides.stage4.flash_survival_reward]
init = 0.7
decay = 0.92

[reward.stage_overrides.stage4.flash_abuse_penalty]
caught_within_steps = 15
caught_coef = -1.0
safe_zone_no_treasure_coef = -0.8
caught_decay_enable = true
caught_decay_min_step = 1
caught_decay_max_step = 15
caught_coef_start = -6.0
caught_coef_end = -1.0